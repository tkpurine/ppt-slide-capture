<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1e293b;
    }

    /* ─── Header ─── */
    .header {
      background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 22px; }
    .header-title { font-size: 14px; font-weight: 700; }
    .header-sub   { font-size: 11px; opacity: .8; margin-top: 1px; }

    /* ─── Shortcut badge ─── */
    .shortcut-bar {
      background: #e0f0ff;
      border-bottom: 1px solid #bfdbfe;
      padding: 8px 14px;
      font-size: 11px;
      color: #1d4ed8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    kbd {
      background: #fff;
      border: 1px solid #93c5fd;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 11px;
      color: #1e40af;
    }

    /* ─── Body ─── */
    .body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    /* ─── Counter card ─── */
    .counter-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .counter-left { display: flex; flex-direction: column; gap: 2px; }
    .counter-num  { font-size: 32px; font-weight: 700; color: #0078d4; line-height: 1; }
    .counter-label { font-size: 11px; color: #64748b; }
    .btn-capture {
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-capture:hover { background: #006abe; }
    .btn-capture:active { background: #005a9e; }

    /* ─── Thumbnail grid ─── */
    .thumb-section { display: flex; flex-direction: column; gap: 6px; }
    .thumb-header {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
      padding: 2px;
    }
    .thumb-item {
      position: relative;
      aspect-ratio: 16/9;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: transform .1s;
    }
    .thumb-item:hover { transform: scale(1.05); }
    .thumb-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-num {
      position: absolute;
      bottom: 2px; right: 3px;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 9px;
      border-radius: 3px;
      padding: 0 3px;
      line-height: 14px;
    }
    .thumb-empty {
      grid-column: 1/-1;
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      padding: 20px 0;
    }

    /* ─── Settings row ─── */
    .settings {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings label { font-size: 12px; color: #475569; white-space: nowrap; }
    .settings input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      color: #1e293b;
    }
    .settings input:focus { outline: none; border-color: #0078d4; }

    /* ─── Action buttons ─── */
    .actions { display: flex; gap: 8px; }
    .btn-download {
      flex: 1;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-download:hover:not(:disabled) { background: #15803d; }
    .btn-download:disabled { background: #86efac; cursor: not-allowed; }

    .btn-clear {
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-clear:hover { background: #fecaca; }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 12px; left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">📸</div>
    <div>
      <div class="header-title">PPT Slide Capture</div>
      <div class="header-sub">SharePoint / PowerPoint Online 対応</div>
    </div>
  </div>

  <div class="shortcut-bar">
    ⌨️ キャプチャ: <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd>
    &nbsp;／ またはボタンで1枚撮影
  </div>

  <div class="body">

    <!-- カウンター + キャプチャボタン -->
    <div class="counter-card">
      <div class="counter-left">
        <div class="counter-num" id="count">0</div>
        <div class="counter-label">枚 キャプチャ済み</div>
      </div>
      <button class="btn-capture" id="btnCapture">📷 今すぐ撮影</button>
    </div>

    <!-- サムネイル -->
    <div class="thumb-section">
      <div class="thumb-header">📋 キャプチャ一覧</div>
      <div class="thumb-grid" id="thumbGrid">
        <div class="thumb-empty" id="emptyMsg">まだキャプチャがありません</div>
      </div>
    </div>

    <!-- ファイル名設定 -->
    <div class="settings">
      <label for="prefix">ファイル名:</label>
      <input type="text" id="prefix" value="slide" placeholder="slide">
    </div>

    <!-- アクションボタン -->
    <div class="actions">
      <button class="btn-download" id="btnDownload" disabled>
        💾 ZIPでまとめてダウンロード
      </button>
      <button class="btn-clear" id="btnClear" title="リセット">🗑</button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
